name = "kaki-quiz-api"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

[[d1_databases]]
binding = "DB"
database_name = "kaki-quiz-db"
database_id = "00000000-0000-0000-0000-000000000000" # placeholder; local dev only
migrations_dir = "migrations"

[durable_objects]
bindings = [{ name = "ROOM", class_name = "RoomDO" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]
