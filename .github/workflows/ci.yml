name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate question bank
        run: node scripts/validate-seed.mjs

      - name: Typecheck (app + worker)
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
